<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FAQs</title>
<link href="assets/css/style.css" rel="stylesheet"/>

<style>
/* reuse same layout as SOP */
</style>
</head>

<body data-back="index.html">

<div class="container">
<div id="bw-global-header"></div>

<section class="heroPanel">
<h1>FAQs</h1>
</section>

<div class="sopLayout">

<div class="sopMenu">
<button data-target="faq-sales">Sales</button>
<button data-target="faq-operations">Operations</button>
<button data-target="faq-inventory">Inventory</button>
<button data-target="faq-management">Management</button>
</div>

<div class="sopContent">

<div id="faq-sales" class="sopPanel active"><h2>Sales FAQs</h2></div>
<div id="faq-operations" class="sopPanel"><h2>Operations FAQs</h2></div>
<div id="faq-inventory" class="sopPanel"><h2>Inventory FAQs</h2></div>
<div id="faq-management" class="sopPanel"><h2>Management FAQs</h2></div>

</div>

</div>

</div>

<script src="assets/js/bw-header.js"></script>

<script>
document.querySelectorAll('.sopMenu button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.sopPanel').forEach(p=>p.classList.remove('active'));
    document.getElementById(btn.dataset.target).classList.add('active');
  });
});
</script>

</body>
</html>
