<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>FAQs</title><link href="assets/css/style.css" rel="stylesheet"/>
<style>
.browserLayout{display:grid;grid-template-columns:320px minmax(0,1fr);gap:18px;align-items:start;margin-top:18px}.browserNav,.browserContent{background:linear-gradient(135deg, rgba(198,40,40,.10), transparent 42%),linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.10);border-radius:24px;box-shadow:0 18px 55px rgba(0,0,0,.30)}.browserNav{padding:14px;position:sticky;top:12px}.browserContent{padding:24px 22px 20px;min-height:620px}.navTitle{margin:2px 4px 14px;font-size:12px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:#e5d1d1;opacity:.9}.subButton{width:100%;background:rgba(255,255,255,.02);color:#d8dee7;border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:12px 13px;margin:8px 0 0;text-align:left;font:inherit;cursor:pointer;line-height:1.35;display:flex;align-items:center;gap:10px}.subButton:hover{background:rgba(255,255,255,.05);color:#fff}.subButton.active{background:rgba(198,40,40,.16);border-color:rgba(198,40,40,.34);color:#fff}.typeIcon{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;background:rgba(198,40,40,.16);border:1px solid rgba(198,40,40,.34);font-size:18px;flex:0 0 38px}.contentBadge{display:inline-flex;align-items:center;gap:8px;min-height:38px;padding:0 14px;border-radius:999px;background:rgba(198,40,40,.16);border:1px solid rgba(198,40,40,.34);font-weight:800;margin-bottom:14px}.contentTitle{margin:0 0 8px!important;font-size:30px;line-height:1.1}.contentLead{margin:0 0 14px;color:#e5d1d1;font-weight:700;line-height:1.55}.placeholderCard{background:rgba(0,0,0,.16);border:1px solid rgba(255,255,255,.10);border-radius:18px;padding:16px;margin-top:14px}@media(max-width:980px){.browserLayout{grid-template-columns:1fr}.browserNav{position:static}.browserContent{min-height:unset}}
</style></head>
<body data-page="page" data-back="index.html"><div class="container"><div id="bw-global-header"></div><section class="heroPanel"><div class="heroIcon">❓</div><h1>FAQs</h1><p class="subtitle" style="text-align:center;max-width:820px;margin:10px auto 0">Quick answers for common branch questions and recurring scenarios.</p></section><section class="browserLayout"><aside class="browserNav"><div class="navTitle">FAQ Areas</div><div id="faqNavRoot"></div></aside><main class="browserContent"><div class="contentBadge" id="contentType">💬 Sales</div><h2 class="contentTitle" id="contentTitle">Sales FAQs</h2><p class="contentLead" id="contentLead">Content coming soon.</p><div id="contentBody" class="placeholderCard"><p>Content coming soon.</p></div></main></section></div><script src="assets/js/bw-header.js"></script><script>
const faqData=[['💬','Sales','Sales FAQs'],['⚙️','Operations','Operations FAQs'],['📦','Inventory','Inventory FAQs'],['🧭','Management','Management FAQs']];const nav=document.getElementById('faqNavRoot'),type=document.getElementById('contentType'),title=document.getElementById('contentTitle'),lead=document.getElementById('contentLead'),body=document.getElementById('contentBody');let active=0;function render(){nav.innerHTML='';faqData.forEach((r,i)=>{const b=document.createElement('button');b.className='subButton'+(i===active?' active':'');b.type='button';b.innerHTML=`<span class="typeIcon">${r[0]}</span><span>${r[1]}</span>`;b.onclick=()=>{active=i;render();show(i)};nav.appendChild(b)})}function show(i){type.textContent=faqData[i][0]+' '+faqData[i][1];title.textContent=faqData[i][2];lead.textContent='Content coming soon.';body.innerHTML='<p>Content coming soon.</p>'}render();show(0);
</script></body></html>
