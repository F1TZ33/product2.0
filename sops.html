<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SOPs</title>
<link href="assets/css/style.css" rel="stylesheet"/>

<style id="bw-browser-edit-format">
.browserLayout,.salesLayout{display:grid;grid-template-columns:320px minmax(0,1fr);gap:18px;align-items:start;margin-top:18px;}
.browserNav,.browserContent,.salesNav,.salesContent{
  background:linear-gradient(135deg, rgba(198,40,40,.10), transparent 42%),linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
  border:1px solid rgba(255,255,255,.10);border-radius:24px;box-shadow:0 18px 55px rgba(0,0,0,.30);
}
.browserNav,.salesNav{padding:14px;position:sticky;top:12px;}
.browserContent,.salesContent{padding:24px 22px 20px;min-height:620px;}
.navTitle{margin:2px 4px 14px;font-size:12px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:#e5d1d1;opacity:.9;}
.typeBlock{margin:10px 0;border:1px solid rgba(255,255,255,.08);border-radius:18px;overflow:hidden;background:rgba(255,255,255,.02);}
.typeButton{width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;background:transparent;border:0;color:#fff;padding:16px;font:inherit;font-weight:800;text-align:left;cursor:pointer;}
.typeButton:hover{background:rgba(255,255,255,.04);}
.typeLabel{display:flex;align-items:center;gap:10px;min-width:0}
.typeIcon{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;background:rgba(198,40,40,.16);border:1px solid rgba(198,40,40,.34);font-size:18px;flex:0 0 38px}
.typeChevron{opacity:.8;transition:transform .18s ease}.typeBlock.open .typeChevron{transform:rotate(90deg)}
.subList{display:none;padding:0 10px 12px}.typeBlock.open .subList{display:block}
.subButton{width:100%;background:rgba(255,255,255,.02);color:#d8dee7;border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:12px 13px;margin:8px 0 0;text-align:left;font:inherit;cursor:pointer;line-height:1.35}
.subButton:hover{background:rgba(255,255,255,.05);color:#fff}.subButton.active{background:rgba(198,40,40,.16);border-color:rgba(198,40,40,.34);color:#fff}
.contentBadge{display:inline-flex;align-items:center;gap:8px;min-height:38px;padding:0 14px;border-radius:999px;background:rgba(198,40,40,.16);border:1px solid rgba(198,40,40,.34);font-weight:800;margin-bottom:14px}
.contentTitle{margin:0 0 8px!important;font-size:30px;line-height:1.1}
.contentLead{margin:0 0 14px;color:#e5d1d1;font-weight:700;line-height:1.55}
.contentList{margin:0;padding-left:0;list-style:none}
.contentList li{margin:9px 0;line-height:1.6;color:#d8dee7}
.bw-editor-panel{display:none!important}
.bw-inline-row{position:relative;display:flex;align-items:flex-start;gap:10px;margin:9px 0;padding:8px 34px 8px 10px;border-radius:12px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06)}
.bw-inline-row[contenteditable="true"], .bw-inline-text[contenteditable="true"], [data-inline-field][contenteditable="true"], .bw-inline-product-line[contenteditable="true"]{outline:1px dashed rgba(198,40,40,.55);outline-offset:2px;background:rgba(255,255,255,.04)}
.bw-inline-text{flex:1;min-height:20px;line-height:1.55;color:#d8dee7}
.bw-inline-delete{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:999px;border:1px solid rgba(198,40,40,.6);background:rgba(198,40,40,.22);color:#fff;display:grid;place-items:center;cursor:pointer;font-weight:900;font-size:13px}
.bw-inline-add{margin-top:12px;border:1px solid rgba(198,40,40,.42);background:rgba(198,40,40,.16);color:#fff;border-radius:999px;padding:8px 12px;font-weight:800;cursor:pointer}
@media(max-width:980px){.browserLayout,.salesLayout{grid-template-columns:1fr}.browserNav,.salesNav{position:static}.browserContent,.salesContent{min-height:unset}}
</style>

</head>
<body data-page="page" data-back="index.html">
<div class="container">
  <div id="bw-global-header"></div>
  <div id="userIndicator">Loading user...</div>
  <section class="heroPanel">
    <div class="heroIcon">📋</div>
    <h1>SOPs</h1>
    <p class="subtitle" style="text-align:center;max-width:820px;margin:10px auto 0">Standard operating procedure placeholders. Select a type on the left and edit the right pane in Azure editor mode.</p>
  </section>
  <section class="browserLayout">
    <aside class="browserNav"><div class="navTitle">Types</div><div id="navRoot"></div></aside>
    <main class="browserContent">
      <div class="contentBadge" id="contentType"></div>
      <h2 class="contentTitle" id="contentTitle" data-inline-field="title"></h2>
      <p class="contentLead" id="contentLead" data-inline-field="lead"></p>
      <div class="contentList" id="contentList"></div>
    </main>
  </section>
</div>
<script src="assets/js/content-store.js"></script>
<script src="assets/js/global.js"></script>

<script>
let pageData=[{"key": "sales", "icon": "🧾", "label": "Sales", "items": [{"title": "Process Sales Order", "lead": "Placeholder content ready for detail.", "points": ["Description", "Steps / answer to be added.", "Escalation notes to be added."]}, {"title": "Release Pickslip", "lead": "Placeholder content ready for detail.", "points": ["Description", "Steps / answer to be added.", "Escalation notes to be added."]}, {"title": "Order Capture", "lead": "Placeholder content ready for detail.", "points": ["Description", "Steps / answer to be added."]}]}, {"key": "inventory", "icon": "📦", "label": "Inventory", "items": [{"title": "Search for Product", "lead": "Placeholder content ready for detail.", "points": ["Description", "Search method / answer to be added."]}, {"title": "Return to DC", "lead": "Placeholder content ready for detail.", "points": ["Description", "Process / answer to be added."]}, {"title": "Receiving Errors", "lead": "Placeholder content ready for detail.", "points": ["Description", "Correction process / answer to be added."]}]}, {"key": "purchasing", "icon": "🛒", "label": "Purchasing", "items": [{"title": "Check Sales History", "lead": "Placeholder content ready for detail.", "points": ["Description", "Steps / answer to be added."]}, {"title": "Check Pricing", "lead": "Placeholder content ready for detail.", "points": ["Description", "Steps / answer to be added."]}, {"title": "Receipt External / Internal Invoice", "lead": "Placeholder content ready for detail.", "points": ["Description", "Steps / answer to be added."]}]}, {"key": "management", "icon": "📊", "label": "Management", "items": [{"title": "Branch Review", "lead": "Placeholder content ready for detail.", "points": ["Description", "Review items to be added."]}, {"title": "Approvals", "lead": "Placeholder content ready for detail.", "points": ["Description", "Approval process to be added."]}]}, {"key": "access", "icon": "🔐", "label": "Access", "items": [{"title": "Access Overview", "lead": "Access checklists now live in the Checklists page.", "points": ["Use Checklists for BW Shared, Branch Shared and Individual access review items.", "This page can retain SOP/FAQ explanation only."]}]}];
const STORAGE_KEY='sops-content';
const DEFAULT_DATA=JSON.parse(JSON.stringify(pageData));
const navRoot=document.getElementById('navRoot'),contentType=document.getElementById('contentType'),contentTitle=document.getElementById('contentTitle'),contentLead=document.getElementById('contentLead'),contentList=document.getElementById('contentList');
let openTypeKey=pageData[0].key, activeItemKey=`${pageData[0].key}-0`;
function canEditInline(){ return !!(window.BWCanEdit || (window.BWContentStore && BWContentStore.canWrite && BWContentStore.canWrite())); }
function activeRefs(){ const type=pageData.find(t=>t.key===openTypeKey)||pageData[0]; const idx=Math.max(0, parseInt(String(activeItemKey).split('-').pop()||'0',10)); return {type,idx,item:type.items[idx]}; }
async function savePageData(){ if(window.BWContentStore){ try{ await BWContentStore.save(STORAGE_KEY,pageData); }catch(e){ console.warn('Save failed',e); } } }
function renderNav(){
  navRoot.innerHTML='';
  pageData.forEach(type=>{
    const block=document.createElement('div'); block.className='typeBlock'+(type.key===openTypeKey?' open':'');
    const btn=document.createElement('button'); btn.className='typeButton'; btn.type='button';
    btn.innerHTML=`<span class="typeLabel"><span class="typeIcon">${type.icon}</span><span>${type.label}</span></span><span class="typeChevron">›</span>`;
    btn.onclick=()=>{openTypeKey=type.key;renderNav();};
    const sub=document.createElement('div'); sub.className='subList';
    type.items.forEach((item,i)=>{
      const key=`${type.key}-${i}`;
      const b=document.createElement('button'); b.className='subButton'+(key===activeItemKey?' active':''); b.type='button'; b.textContent=item.title||'Description';
      b.onclick=()=>{openTypeKey=type.key;activeItemKey=key;renderNav();renderContent(type,item);};
      sub.appendChild(b);
    });
    const add=document.createElement('button'); add.className='bw-inline-add'; add.type='button'; add.textContent='+ Add entry'; add.style.display=canEditInline()?'inline-block':'none';
    add.onclick=async()=>{type.items.push({title:'Description',lead:'',points:['Description']});activeItemKey=`${type.key}-${type.items.length-1}`;renderNav();renderContent(type,type.items[type.items.length-1]);await savePageData();};
    block.appendChild(btn); block.appendChild(sub); block.appendChild(add); navRoot.appendChild(block);
  });
}
function editable(el,onSave){
  if(!canEditInline()) return;
  el.contentEditable='true';
  el.onblur=async()=>{onSave(el.textContent.trim()); renderNav(); await savePageData();};
  el.onkeydown=e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); el.blur(); } };
}
function renderContent(type,item){
  contentType.textContent=`${type.icon} ${type.label}`;
  contentTitle.textContent=item.title||'Description';
  contentLead.textContent=item.lead||'';
  contentTitle.contentEditable='false'; contentLead.contentEditable='false';
  editable(contentTitle,v=>item.title=v||'Description');
  editable(contentLead,v=>item.lead=v);
  contentList.innerHTML='';
  item.points=item.points||[];
  item.points.forEach((point,i)=>{
    const row=document.createElement('div'); row.className='bw-inline-row';
    const dot=document.createElement('span'); dot.textContent='•';
    const txt=document.createElement('div'); txt.className='bw-inline-text'; txt.textContent=point||'Description';
    row.appendChild(dot); row.appendChild(txt);
    if(canEditInline()){
      txt.contentEditable='true';
      txt.onblur=async()=>{item.points[i]=txt.textContent.trim()||'Description'; await savePageData();};
      txt.onkeydown=e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); item.points.splice(i+1,0,'Description'); renderContent(type,item); savePageData(); } };
      const del=document.createElement('button'); del.className='bw-inline-delete'; del.type='button'; del.textContent='×';
      del.onclick=async()=>{item.points.splice(i,1); renderContent(type,item); await savePageData();};
      row.appendChild(del);
    }
    contentList.appendChild(row);
  });
  if(canEditInline()){
    const add=document.createElement('button'); add.className='bw-inline-add'; add.type='button'; add.textContent='+ Add line';
    add.onclick=async()=>{item.points.push('Description'); renderContent(type,item); await savePageData();};
    contentList.appendChild(add);
  }
}
async function init(){
  renderNav(); renderContent(pageData[0],pageData[0].items[0]);
  try{ if(window.BWContentStore){ await BWContentStore.waitForUser(); const remote=await BWContentStore.get(STORAGE_KEY,null); if(remote) pageData=remote; } }catch(e){ console.warn(e); }
  openTypeKey=pageData[0].key; activeItemKey=`${pageData[0].key}-0`; renderNav(); renderContent(pageData[0],pageData[0].items[0]);
}
document.addEventListener('bw:user-ready',()=>{renderNav(); const r=activeRefs(); if(r.item) renderContent(r.type,r.item);});
init();
</script>

<script src="assets/js/bw-header.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
