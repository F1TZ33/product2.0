<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SOPs</title>
<link href="assets/css/style.css" rel="stylesheet"/>
<style>
.browserLayout{display:grid;grid-template-columns:320px minmax(0,1fr);gap:18px;align-items:start;margin-top:18px;}
.browserNav,.browserContent{background:linear-gradient(135deg, rgba(198,40,40,.10), transparent 42%),linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.10);border-radius:24px;box-shadow:0 18px 55px rgba(0,0,0,.30);}
.browserNav{padding:14px;position:sticky;top:12px;}.browserContent{padding:24px 22px 20px;min-height:620px;}
.navTitle{margin:2px 4px 14px;font-size:12px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:#e5d1d1;opacity:.9;}
.typeBlock{margin:10px 0;border:1px solid rgba(255,255,255,.08);border-radius:18px;overflow:hidden;background:rgba(255,255,255,.02);}.typeButton{width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;background:transparent;border:0;color:#fff;padding:16px;font:inherit;font-weight:800;text-align:left;cursor:pointer;}.typeButton:hover{background:rgba(255,255,255,.04);}.typeLabel{display:flex;align-items:center;gap:10px;min-width:0;}.typeIcon{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;background:rgba(198,40,40,.16);border:1px solid rgba(198,40,40,.34);font-size:18px;flex:0 0 38px;}.typeChevron{opacity:.8;transition:transform .18s ease;}.typeBlock.open .typeChevron{transform:rotate(90deg);}.subList{display:none;padding:0 10px 12px;}.typeBlock.open .subList{display:block;}.subButton{width:100%;background:rgba(255,255,255,.02);color:#d8dee7;border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:12px 13px;margin:8px 0 0;text-align:left;font:inherit;cursor:pointer;line-height:1.35;}.subButton:hover{background:rgba(255,255,255,.05);color:#fff;}.subButton.active{background:rgba(198,40,40,.16);border-color:rgba(198,40,40,.34);color:#fff;}
.contentBadge{display:inline-flex;align-items:center;gap:8px;min-height:38px;padding:0 14px;border-radius:999px;background:rgba(198,40,40,.16);border:1px solid rgba(198,40,40,.34);font-weight:800;margin-bottom:14px;}.contentTitle{margin:0 0 8px !important;font-size:30px;line-height:1.1;}.contentLead{margin:0 0 14px;color:#e5d1d1;font-weight:700;line-height:1.55;}.placeholderCard,.accessCard{background:rgba(0,0,0,.16);border:1px solid rgba(255,255,255,.10);border-radius:18px;padding:16px;margin-top:14px;}.accessTools{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0 16px;}.smallAction{border:1px solid rgba(198,40,40,.42);background:rgba(198,40,40,.16);color:#fff;border-radius:999px;padding:8px 12px;font-weight:800;cursor:pointer;}.accessList{display:grid;gap:8px;margin-top:8px;}.accessItem{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:10px 12px;}.accessItem input{width:18px;height:18px;accent-color:#c62828;}.accessName{font-weight:800;color:#fff;}.accessTag{margin-left:auto;font-size:11px;letter-spacing:.08em;text-transform:uppercase;border-radius:999px;padding:4px 9px;font-weight:900;border:1px solid rgba(255,255,255,.12);}.accessTag.all{background:rgba(22,101,52,.55);color:#dcfce7;}.accessTag.managers{background:rgba(180,83,9,.60);color:#ffedd5;}.accessNote{color:var(--muted);font-size:13px;margin:8px 0 0;}@media (max-width:980px){.browserLayout{grid-template-columns:1fr;}.browserNav{position:static;}.browserContent{min-height:unset;}}
</style>
</head>
<body data-page="page" data-back="index.html">
<div class="container"><div id="bw-global-header"></div>
<section class="heroPanel"><div class="heroIcon">📋</div><h1>SOPs</h1><p class="subtitle" style="text-align:center;max-width:820px;margin:10px auto 0">Standard operating procedures, branch access requirements, and process references.</p></section>
<section class="browserLayout"><aside class="browserNav"><div class="navTitle">SOP Areas</div><div id="sopNavRoot"></div></aside><main class="browserContent"><div class="contentBadge" id="contentType">🧾 Sales</div><h2 class="contentTitle" id="contentTitle">Process Sales Order</h2><p class="contentLead" id="contentLead">Content coming soon.</p><div id="contentBody" class="placeholderCard"><p>Content coming soon.</p></div></main></section>
</div>
<script src="assets/js/bw-header.js"></script>
<script>
const sopData=[{key:'sales',icon:'🧾',label:'Sales',items:[['process-sales','Process Sales Order'],['release-pickslip','Release Pickslip'],['direct-deposit','Process Direct Deposit Sale']]},{key:'inventory',icon:'📦',label:'Inventory',items:[['search-product','Search For Product'],['return-dc','Return to DC'],['receiving-errors','Receiving Errors']]},{key:'purchasing',icon:'🛒',label:'Purchasing',items:[['sales-history','Check Sales History'],['check-pricing','Check Pricing'],['receipt-external','Receipt External Invoice'],['receipt-internal','Receipt Internal Invoice']]},{key:'management',icon:'🧭',label:'Management',items:[['management-access','Access']]},{key:'access',icon:'🔐',label:'Access',items:[['access-bw','BW Shared Access'],['access-branch','Branch Shared Access'],['access-individual','Individual Shared Access']]}];
const accessData={'access-bw':[['NSK','all']],'access-branch':[['Bearing Net','all'],['Sutton','all'],['ITM','all'],['Industrial World','all'],['Smart Freight','all'],['Sparex','all'],['Optibelt','all'],['Sheffield','all']],'access-individual':[['Universal Bearings','all'],['Australian Bearings','all'],['Sealing Australia','all'],['Koyo','all'],['Timken','all'],['Finer','all'],['BW Trade Teams Channel','all'],['BW Everyone Teams Channel','all'],['Oscar','all'],['Momentum Pro - with PIN','all'],['Core Training / Preceda','all'],['Service Now','all'],['Teams - SOP’s','all'],['BW Managers Channel','managers'],['Custom Fleet','managers'],['Phocas','managers']]};
const sopNavRoot=document.getElementById('sopNavRoot'),contentType=document.getElementById('contentType'),contentTitle=document.getElementById('contentTitle'),contentLead=document.getElementById('contentLead'),contentBody=document.getElementById('contentBody');let openTypeKey='sales',activeItemKey='process-sales';
function renderNav(){sopNavRoot.innerHTML='';sopData.forEach(type=>{const block=document.createElement('div');block.className='typeBlock'+(type.key===openTypeKey?' open':'');const btn=document.createElement('button');btn.className='typeButton';btn.type='button';btn.innerHTML=`<span class="typeLabel"><span class="typeIcon">${type.icon}</span><span>${type.label}</span></span><span class="typeChevron">›</span>`;btn.onclick=()=>{openTypeKey=type.key;renderNav();};const subList=document.createElement('div');subList.className='subList';type.items.forEach(item=>{const subBtn=document.createElement('button');subBtn.className='subButton'+(item[0]===activeItemKey?' active':'');subBtn.type='button';subBtn.textContent=item[1];subBtn.onclick=()=>{openTypeKey=type.key;activeItemKey=item[0];renderNav();renderContent(type,item);};subList.appendChild(subBtn);});block.appendChild(btn);block.appendChild(subList);sopNavRoot.appendChild(block);});}
function accessKey(id,name){return 'bwAccessChecklist::'+id+'::'+name.toLowerCase().replace(/[^a-z0-9]+/g,'-');}
function renderAccess(id){const rows=accessData[id]||[];const list=rows.map(([name,who])=>{const key=accessKey(id,name);const checked=localStorage.getItem(key)==='1'?'checked':'';const tagClass=who==='managers'?'managers':'all';const tagText=who==='managers'?'MANAGERS':'ALL';return `<label class="accessItem"><input type="checkbox" data-access-key="${key}" ${checked}><span class="accessName">${name}</span><span class="accessTag ${tagClass}">${tagText}</span></label>`;}).join('');return `<div class="accessCard"><div class="accessTools"><button class="smallAction" type="button" onclick="setAccessChecklist('${id}',true)">Mark all complete</button><button class="smallAction" type="button" onclick="setAccessChecklist('${id}',false)">Clear this list</button></div><div class="accessList">${list}</div><p class="accessNote">Checklist ticks save locally on this device/browser only.</p></div>`;}
function setAccessChecklist(id,checked){document.querySelectorAll('#contentBody input[data-access-key]').forEach(box=>{box.checked=checked;localStorage.setItem(box.dataset.accessKey,checked?'1':'0');});}
function renderContent(type,item){contentType.textContent=`${type.icon} ${type.label}`;contentTitle.textContent=item[1];if(accessData[item[0]]){contentLead.textContent='Default access checklist for onboarding and access reviews.';contentBody.className='';contentBody.innerHTML=renderAccess(item[0]);}else{contentLead.textContent='Content coming soon.';contentBody.className='placeholderCard';contentBody.innerHTML='<p>Content coming soon.</p>';}}
document.addEventListener('change',event=>{const box=event.target.closest('input[data-access-key]');if(!box)return;localStorage.setItem(box.dataset.accessKey,box.checked?'1':'0');});
renderNav();renderContent(sopData[0],sopData[0].items[0]);
</script>
</body>
</html>
